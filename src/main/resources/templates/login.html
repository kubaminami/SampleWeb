<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ログイン</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

	<div th:replace="~{fragments/header :: header}"></div>
	<div th:replace="~{fragments/home :: home}"></div>

	<div class="form-container">
		<h1>ログイン</h1>

		<p th:if="${message}" class="error-message" th:text="${message}">
		<form th:action="@{/login}" method="post">

			<div class="form-row">
				<label>メールアドレス</label>
			</div>
			<div class="form-row">
				<input type="email" name="email">
			</div>
			<div class="form-row">
				<label>パスワード</label>
			</div>
			<div class="form-row">
				<input type="password" name="password">
			</div>
			<div class="form-row">
				<button type="submit">ログイン</button>
			</div>
		</form>

		<a th:href="@{/signup}">会員登録</a>



		<p>---------------------------下記でログインしてください---------------------------</p>
		<p>メールアドレス：testmail@example.com</p>
		<p>パスワード：testpass</p>
		<p></p>
		<p>ログインすると商品追加・編集・削除・注文</p>
		<p>およびマイページ・注文履歴の確認ができます</p>

	</div>
</body>
</html>
