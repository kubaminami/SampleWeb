<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

	<div th:fragment="categoryTabs" class="tabs">
		<a th:href="@{/products}" th:class="${selectedCategory == null}
          ? 'tab active-tab'
          : 'tab'">All</a> <a th:each="c : ${categories}"
			th:href="@{/products(category=${c.name})}"
			th:class="${selectedCategory == c.name}
          ? 'tab active-tab'
          : 'tab'"><span
			th:text="${c.name}"></span></a>
	</div>

</body>
</html>
